# =============================================================
#  Ingress — vanjski pristup Keycloaku
#  Usmjerava ${KEYCLOAK_HOSTNAME} na servis Keycloaka.
#  ingressClassName 'public' je podrazumijevana klasa koju
#  kreira microk8s ingress dodatak.
# =============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: ${NAMESPACE}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: public
  tls:
    - hosts:
        - ${KEYCLOAK_HOSTNAME}
      secretName: keycloak-tls
  rules:
    - host: ${KEYCLOAK_HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-unibl-service
                port:
                  number: 8443
